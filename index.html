<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Color Box Prototype V2</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

.controls {
    margin-bottom: 10px;
}

label {
    margin-right: 10px;
}

canvas {
    border: 2px solid #333;
    touch-action: none;
    cursor: crosshair;
}

.info {
    margin-top: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h2>Color Box Prototype V2</h2>

<div class="controls">
    <label>
        Rows:
        <input id="rows" type="number" value="8" min="2" max="30">
    </label>

    <label>
        Cols:
        <input id="cols" type="number" value="8" min="2" max="30">
    </label>

    <label>
        Colors:
        <input id="colorCount" type="number" value="4" min="2" max="10">
    </label>

    <label>
        Timer:
        <input id="timerSeconds" type="number" value="60" min="30" max="180">
    </label>

    <button onclick="generateBoard()">Generate</button>
</div>

<canvas id="canvas"></canvas>

<div class="info">
    Score: <span id="score">0</span> |
    Combo: <span id="combo">1</span> |
    Time: <span id="time">60</span>
</div>

<script>

const CELL = 50;

const palette = [
    "#ff5252","#4caf50","#2196f3","#ffeb3b",
    "#9c27b0","#ff9800","#00bcd4","#795548",
    "#e91e63","#607d8b"
];

let board = [];
let rows = 8;
let cols = 8;
let colorCount = 4;

let score = 0;
let combo = 1;

let dragStart = null;
let dragCurrent = null;

let comboTimer = null;

let timeLeft = 60;
let gameTimer = null;
let gameRunning = false;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function updateUI() {
    document.getElementById("score").textContent = score;
    document.getElementById("combo").textContent = combo;
    document.getElementById("time").textContent = timeLeft;
}

function startTimer() {

    clearInterval(gameTimer);

    gameTimer = setInterval(() => {

        if(!gameRunning) return;

        timeLeft--;
        updateUI();

        if(timeLeft <= 0) {
            gameOver();
        }

    },1000);
}

function gameOver() {
    gameRunning = false;
    clearInterval(gameTimer);

    alert("Time Up!\nScore: " + score);
}

function generateBoard() {

    rows = +document.getElementById("rows").value;
    cols = +document.getElementById("cols").value;
    colorCount = +document.getElementById("colorCount").value;

    timeLeft = +document.getElementById("timerSeconds").value;

    canvas.width = cols * CELL;
    canvas.height = rows * CELL;

    board = [];

    for(let r=0;r<rows;r++){
        const row = [];
        for(let c=0;c<cols;c++){
            row.push({
                color: Math.floor(Math.random()*colorCount),
                removed: false
            });
        }
        board.push(row);
    }

    score = 0;
    combo = 1;
    gameRunning = true;

    updateUI();
    startTimer();
    draw();
}

function draw() {

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){

            const cell = board[r][c];

            ctx.fillStyle = cell.removed
                ? "#fff"
                : palette[cell.color];

            ctx.fillRect(c*CELL,r*CELL,CELL,CELL);

            ctx.strokeStyle = "#000";
            ctx.strokeRect(c*CELL,r*CELL,CELL,CELL);
        }
    }

    if(dragStart && dragCurrent) {

        const x = Math.min(dragStart.x, dragCurrent.x);
        const y = Math.min(dragStart.y, dragCurrent.y);
        const w = Math.abs(dragStart.x - dragCurrent.x);
        const h = Math.abs(dragStart.y - dragCurrent.y);

        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.strokeRect(x,y,w,h);
    }
}

function getMouse(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

function getTouch(t) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: t.clientX - rect.left,
        y: t.clientY - rect.top
    };
}

canvas.addEventListener("mousedown", e => {
    if(!gameRunning) return;
    dragStart = getMouse(e);
    dragCurrent = dragStart;
});

canvas.addEventListener("mousemove", e => {
    if(!dragStart || !gameRunning) return;
    dragCurrent = getMouse(e);
    draw();
});

canvas.addEventListener("mouseup", () => {
    if(!gameRunning) return;
    processSelection();
    dragStart = null;
    dragCurrent = null;
    draw();
});

// TOUCH
canvas.addEventListener("touchstart", e => {
    if(!gameRunning) return;
    e.preventDefault();
    dragStart = getTouch(e.touches[0]);
    dragCurrent = dragStart;
});

canvas.addEventListener("touchmove", e => {
    if(!dragStart || !gameRunning) return;
    e.preventDefault();
    dragCurrent = getTouch(e.touches[0]);
    draw();
},{passive:false});

canvas.addEventListener("touchend", e => {
    if(!gameRunning) return;
    processSelection();
    dragStart = null;
    dragCurrent = null;
    draw();
});

function processSelection() {

    const left = Math.min(dragStart.x, dragCurrent.x);
    const right = Math.max(dragStart.x, dragCurrent.x);
    const top = Math.min(dragStart.y, dragCurrent.y);
    const bottom = Math.max(dragStart.y, dragCurrent.y);

    let selected = [];

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){

            const x = c*CELL;
            const y = r*CELL;

            const overlap =
                x < right &&
                x+CELL > left &&
                y < bottom &&
                y+CELL > top;

            if(overlap && !board[r][c].removed){
                selected.push({
                    r,c,
                    color:board[r][c].color
                });
            }
        }
    }

    if(selected.length < 2) {
        combo = 1;
        updateUI();
        return;
    }

    const first = selected[0].color;

    const valid = selected.every(s => s.color === first);

    if(!valid) {
        combo = 1;
        updateUI();
        return;
    }

    const base = selected.length * selected.length;

    score += base * combo;

    combo++;

    resetComboTimer();

    selected.forEach(s => {
        board[s.r][s.c].removed = true;
    });

    updateUI();
}

function resetComboTimer() {

    clearTimeout(comboTimer);

    comboTimer = setTimeout(() => {
        combo = 1;
        updateUI();
    },3000);
}

generateBoard();

</script>

</body>
</html>
