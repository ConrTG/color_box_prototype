<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Color Box Responsive V3</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

.controls {
    padding: 10px;
    background: #f2f2f2;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}

canvas {
    flex: 1;
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    background: white;
}

.info {
    padding: 8px;
    background: #eee;
}
</style>
</head>

<body>

<div class="controls">
    Rows <input id="rows" type="number" value="8" min="2" max="30">
    Cols <input id="cols" type="number" value="8" min="2" max="30">
    Colors <input id="colorCount" type="number" value="4" min="2" max="10">
    Timer <input id="timerSeconds" type="number" value="60" min="30" max="180">
    <button onclick="generateBoard()">Generate</button>
</div>

<canvas id="canvas"></canvas>

<div class="info">
    Score: <span id="score">0</span> |
    Combo: <span id="combo">1</span> |
    Time: <span id="time">60</span>
</div>

<script>

const palette = [
    "#ff5252","#4caf50","#2196f3","#ffeb3b",
    "#9c27b0","#ff9800","#00bcd4","#795548"
];

let board = [];
let rows = 8;
let cols = 8;
let colorCount = 4;

let score = 0;
let combo = 1;

let timeLeft = 60;
let gameRunning = false;

let dragStart = null;
let dragCurrent = null;

let comboTimer = null;
let gameTimer = null;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let CELL = 40; // 動態更新

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 60; // 留 control/info 空間
    draw();
}

window.addEventListener("resize", () => {
    resizeCanvas();
});

function calcCellSize() {

    CELL = Math.floor(
        Math.min(
            canvas.width / cols,
            canvas.height / rows
        )
    );
}

function updateUI() {
    document.getElementById("score").textContent = score;
    document.getElementById("combo").textContent = combo;
    document.getElementById("time").textContent = timeLeft;
}

function startTimer() {

    clearInterval(gameTimer);

    gameTimer = setInterval(() => {

        if(!gameRunning) return;

        timeLeft--;
        updateUI();

        if(timeLeft <= 0) {
            gameOver();
        }

    },1000);
}

function gameOver() {
    gameRunning = false;
    clearInterval(gameTimer);
    alert("Game Over\nScore: " + score);
}

function generateBoard() {

    rows = +document.getElementById("rows").value;
    cols = +document.getElementById("cols").value;
    colorCount = +document.getElementById("colorCount").value;
    timeLeft = +document.getElementById("timerSeconds").value;

    board = [];

    for(let r=0;r<rows;r++){
        let row = [];
        for(let c=0;c<cols;c++){
            row.push({
                color: Math.floor(Math.random()*colorCount),
                removed: false
            });
        }
        board.push(row);
    }

    score = 0;
    combo = 1;
    gameRunning = true;

    updateUI();
    startTimer();

    resizeCanvas();
}

function draw() {

    ctx.clearRect(0,0,canvas.width,canvas.height);

    calcCellSize();

    const offsetX = (canvas.width - cols*CELL)/2;
    const offsetY = (canvas.height - rows*CELL)/2;

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){

            const cell = board[r][c];

            ctx.fillStyle = cell.removed
                ? "#fff"
                : palette[cell.color];

            ctx.fillRect(
                offsetX + c*CELL,
                offsetY + r*CELL,
                CELL,
                CELL
            );

            ctx.strokeStyle = "#000";
            ctx.strokeRect(
                offsetX + c*CELL,
                offsetY + r*CELL,
                CELL,
                CELL
            );
        }
    }

    if(dragStart && dragCurrent) {

        const x = Math.min(dragStart.x, dragCurrent.x);
        const y = Math.min(dragStart.y, dragCurrent.y);
        const w = Math.abs(dragStart.x - dragCurrent.x);
        const h = Math.abs(dragStart.y - dragCurrent.y);

        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.strokeRect(x,y,w,h);
    }
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

function getTouch(t) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: t.clientX - rect.left,
        y: t.clientY - rect.top
    };
}

/* INPUT */

canvas.addEventListener("mousedown", e => {
    if(!gameRunning) return;
    dragStart = getPos(e);
    dragCurrent = dragStart;
});

canvas.addEventListener("mousemove", e => {
    if(!dragStart || !gameRunning) return;
    dragCurrent = getPos(e);
    draw();
});

canvas.addEventListener("mouseup", () => {
    if(!gameRunning) return;
    process();
    dragStart = null;
    dragCurrent = null;
    draw();
});

/* TOUCH */

canvas.addEventListener("touchstart", e => {
    if(!gameRunning) return;
    e.preventDefault();
    dragStart = getTouch(e.touches[0]);
    dragCurrent = dragStart;
});

canvas.addEventListener("touchmove", e => {
    if(!dragStart || !gameRunning) return;
    e.preventDefault();
    dragCurrent = getTouch(e.touches[0]);
    draw();
},{passive:false});

canvas.addEventListener("touchend", () => {
    if(!gameRunning) return;
    process();
    dragStart = null;
    dragCurrent = null;
    draw();
});

function process() {

    const offsetX = (canvas.width - cols*CELL)/2;
    const offsetY = (canvas.height - rows*CELL)/2;

    const left = Math.min(dragStart.x, dragCurrent.x);
    const right = Math.max(dragStart.x, dragCurrent.x);
    const top = Math.min(dragStart.y, dragCurrent.y);
    const bottom = Math.max(dragStart.y, dragCurrent.y);

    let selected = [];

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){

            const x = offsetX + c*CELL;
            const y = offsetY + r*CELL;

            const hit =
                x < right &&
                x + CELL > left &&
                y < bottom &&
                y + CELL > top;

            if(hit && !board[r][c].removed){
                selected.push({
                    r,c,
                    color:board[r][c].color
                });
            }
        }
    }

    if(selected.length < 2) {
        combo = 1;
        updateUI();
        return;
    }

    const color = selected[0].color;

    if(!selected.every(s => s.color === color)) {
        combo = 1;
        updateUI();
        return;
    }

    const base = selected.length * selected.length;
    score += base * combo;

    combo++;

    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => {
        combo = 1;
        updateUI();
    },3000);

    selected.forEach(s => {
        board[s.r][s.c].removed = true;
    });

    updateUI();
}

generateBoard();
resizeCanvas();

</script>

</body>
</html>
